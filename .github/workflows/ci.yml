name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ============================================
  # 构建和单元测试
  # ============================================
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean install -DskipTests -q

      - name: Run Unit Tests (nebula-common)
        run: mvn test -pl nebula-common -q

      - name: Run Unit Tests (nebula-server - excluding integration)
        run: |
          mvn test -pl nebula-server \
            -Dtest="!*IntegrationTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ============================================
  # ES 集成测试（需要 Elasticsearch 和 Redis）
  # ============================================
  integration-test:
    name: ES Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      # Elasticsearch 服务
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: '-Xms512m -Xmx512m'
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      
      # Redis 服务
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Elasticsearch..."
          until curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green\|yellow"'; do
            sleep 5
          done
          echo "✅ Elasticsearch is ready"
          
          echo "Waiting for Redis..."
          until docker exec $(docker ps -q -f "ancestor=redis:7.0") redis-cli ping | grep -q "PONG"; do
            sleep 2
          done
          echo "✅ Redis is ready"

      - name: Build project
        run: mvn clean install -DskipTests -q

      - name: Run ES Integration Tests
        env:
          ELASTICSEARCH_URL: http://localhost:9200
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          mvn test -pl nebula-server \
            -Dtest="*IntegrationTest" \
            -DfailIfNoTests=false

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ============================================
  # 代码质量检查
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Check code compiles
        run: mvn compile -q

      - name: Check for common issues
        run: |
          echo "📋 Checking for TODO/FIXME comments..."
          grep -rn "TODO\|FIXME" --include="*.java" nebula-*/src/main || echo "No TODOs found"
          
          echo ""
          echo "📋 Checking for System.out usage in production code..."
          grep -rn "System.out" --include="*.java" nebula-server/src/main nebula-agent/src/main | head -20 || echo "No System.out found"

  # ============================================
  # 打包构建物
  # ============================================
  package:
    name: Package Artifacts
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Package all modules
        run: mvn package -DskipTests -q

      - name: Upload nebula-agent JAR
        uses: actions/upload-artifact@v4
        with:
          name: nebula-agent
          path: nebula-agent/target/nebula-agent-*.jar
          retention-days: 30

      - name: Upload nebula-server JAR
        uses: actions/upload-artifact@v4
        with:
          name: nebula-server
          path: nebula-server/target/nebula-server.jar
          retention-days: 30

  # ============================================
  # 测试报告汇总
  # ============================================
  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: always()
    
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: unit-test-results
        continue-on-error: true

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-results
        continue-on-error: true

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/surefire-reports/*.xml'
          fail_on_failure: false
          include_passed: true
          detailed_summary: true
