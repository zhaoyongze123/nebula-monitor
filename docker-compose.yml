services:
  # Redis 容器：作为监控数据的高速缓冲区
  redis:
    image: redis:7.0
    container_name: nebula-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
    networks:
      - nebula-net
    command: redis-server --appendonly yes

  # Elasticsearch 容器：作为监控数据的最终持久化存储
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: nebula-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./docker/es/data:/usr/share/elasticsearch/data
    networks:
      - nebula-net
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 可视化管理界面
  phpRedisAdmin:
    image: erikdubbelboer/phpredisadmin:latest
    container_name: nebula-redis-admin
    environment:
      - REDIS_1_HOST=redis
      - REDIS_1_PORT=6379
      - REDIS_1_NAME=Nebula-Redis
    ports:
      - "8001:80"
    networks:
      - nebula-net
    depends_on:
      - redis

  # ES 可视化管理界面 (Kibana)
  kibana:
    image: kibana:8.10.2
    container_name: nebula-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"
    networks:
      - nebula-net
    depends_on:
      - elasticsearch

  # Grafana 监控仪表盘 - 业界最流行的可视化平台
  # 专用于实时指标展示、报警、大屏展示等场景
  grafana:
    image: grafana/grafana:latest
    container_name: nebula-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123    # 初始管理员密码
      - GF_SECURITY_ADMIN_USER=admin           # 初始管理员用户名
      - http_proxy=                             # 禁用代理
      - https_proxy=                            # 禁用代理
      - HTTP_PROXY=                             # 禁用代理
      - HTTPS_PROXY=                            # 禁用代理
    ports:
      - "3000:3000"                            # Grafana Web UI
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning  # 自动配置数据源和仪表盘
    networks:
      - nebula-net
    depends_on:
      - elasticsearch

networks:
  nebula-net:
    driver: bridge
