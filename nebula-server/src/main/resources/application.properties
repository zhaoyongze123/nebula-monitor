# ========================================
# Nebula Server Configuration
# ========================================

# ========================================
# Redis Configuration
# ========================================
nebula.redis.host=localhost
nebula.redis.port=6379
nebula.redis.pool-size=30
nebula.redis.timeout=2000

# ========================================
# Elasticsearch Configuration
# ========================================
nebula.elasticsearch.endpoints=http://localhost:9200
nebula.elasticsearch.timeout=5000

# ========================================
# AI Diagnosis Configuration
# ========================================
# Enable/Disable AI diagnosis feature
nebula.ai.enabled=true

# Base URL for AI service (GitHub Models - Azure)
nebula.ai.baseurl=https://models.inference.ai.azure.com

# API Key - injected via environment variable (NEVER hardcode)
nebula.ai.api-key=${NEBULA_AI_KEY}

# AI Model name
nebula.ai.model=gpt-4o-mini

# Slow trace diagnosis threshold (milliseconds)
# Traces exceeding this duration will trigger AI diagnosis
nebula.ai.threshold=1000

# AI API call timeout (milliseconds)
nebula.ai.timeout=10000

# Number of retries for AI API calls
nebula.ai.retry-count=3

# Retry interval between attempts (milliseconds)
nebula.ai.retry-interval=500

# ========================================
# Diagnosis Thread Pool Configuration
# ========================================
# Core thread pool size for diagnosis tasks
nebula.diagnosis.thread-pool-core=10

# Maximum thread pool size for diagnosis tasks
nebula.diagnosis.thread-pool-max=50

# Thread pool queue capacity
nebula.diagnosis.thread-pool-queue=1000

# ========================================
# System Metrics Collection
# ========================================
# Interval to collect system metrics for diagnosis (milliseconds)
nebula.diagnosis.metrics-collection-interval=1000

# Lookback window for comparative analysis (milliseconds)
nebula.diagnosis.comparative-window=300000

# Number of comparative samples to include
nebula.diagnosis.comparative-samples=10
